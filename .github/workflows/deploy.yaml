name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: stillwater-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        env:
          DATABASE_URL: postgresql://localhost:5432/stillwaters
          DB_MIGRAGE_URL: postgresql://localhost:5432/stillwaters
          APP_ORIGIN: http://localhost:3000
          MAILGUN_API_KEY: TEST
          MAILGUN_DOMAIN: TEST
        run: npm run build

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /var/www/stillwater
            git pull origin main
            npm ci
            set -a
            . ./.env
            set +a
            npm run migrate
            npm run build
            /home/ubuntu/.nvm/versions/node/v24.4.1/bin/pm2 restart stillwater
